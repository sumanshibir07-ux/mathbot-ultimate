<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBot — Ultimate Solver</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
#app { display: flex; flex-direction: column; height: 96vh; max-height: 820px; width: 100%; max-width: 520px; border-radius: 18px; overflow: hidden; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.13); }

/* HEADER */
#header { display: flex; align-items: center; gap: 12px; padding: 13px 18px; background: #f8f9fa; border-bottom: 1px solid #eee; flex-shrink: 0; }
#face { width: 46px; height: 46px; border-radius: 50%; background: #fff; border: 2px solid #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
#face.thinking { animation: think 0.6s ease-in-out infinite; }
@keyframes think{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#hinfo { flex: 1; }
#hname { font-size: 15px; font-weight: 700; color: #111; }
#hsub { font-size: 11px; color: #999; margin-top: 1px; }
#hstatus { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; }
.sdot.busy { background: #ff9800; animation: bl .7s infinite; }
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
#stxt { font-size: 11px; color: #888; }
#hctrl { display: flex; gap: 6px; align-items: center; }
.hbtn { padding: 5px 12px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.hbtn.on { background: #e8f0fe; color: #1a73e8; border-color: #aac4f5; }
#spdbtn { padding: 5px 10px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; font-size: 12px; cursor: pointer; font-family: inherit; }

/* WAVE */
#wavebar { display: flex; align-items: center; gap: 3px; padding: 5px 18px; background: #f8f9fa; border-bottom: 1px solid #eee; flex-shrink: 0; height: 26px; opacity: 0; transition: opacity 0.3s; }
.wb { width: 3px; border-radius: 2px; background: #1a73e8; height: 4px; transition: height 0.08s; }

/* QUICK BUTTONS */
#qrow { display: flex; gap: 5px; flex-wrap: wrap; padding: 7px 14px; background: #f8f9fa; border-bottom: 1px solid #eee; flex-shrink: 0; }
.qb { font-size: 11px; padding: 4px 10px; border-radius: 14px; border: 1px solid #e0e0e0; background: #fff; color: #555; cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
.qb:hover { background: #f0f0f0; color: #111; }

/* MESSAGES */
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; background: #f5f6f8; scroll-behavior: smooth; }
.msg { display: flex; gap: 9px; max-width: 95%; opacity: 0; animation: fu .3s ease forwards; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 78%; }
.msg.agent { align-self: flex-start; }
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av { width: 28px; height: 28px; border-radius: 50%; background: #e8e8e8; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
.ubub { padding: 10px 14px; font-size: 13.5px; line-height: 1.6; background: #1a73e8; color: #fff; border-radius: 16px 4px 16px 16px; word-break: break-word; }
.atch-img { max-width: 180px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 5px; display: block; }
.atch-chip { display: inline-flex; align-items: center; gap: 6px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 10px; padding: 4px 10px; font-size: 12px; color: #555; margin-bottom: 5px; }
.ts { font-size: 10px; color: #bbb; margin-top: 3px; padding: 0 3px; }

/* SOLUTION */
.sol-wrap { display: flex; flex-direction: column; gap: 8px; }
.prob-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; }
.prob-lbl { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.prob-eq { font-family: 'Courier New', monospace; font-size: 14px; color: #111; font-weight: 600; line-height: 1.6; }
.intro-txt { font-size: 12.5px; color: #666; line-height: 1.75; }

.step-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; transition: border-color 0.25s; }
.step-card.active-step { border-color: #1a73e8; }
.step-head { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-bottom: 1px solid #f0f0f0; }
.snum { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.snum.bracket { background: #fff3e0; color: #e65100; }
.snum.order { background: #fce4ec; color: #c62828; }
.snum.division { background: #e3f2fd; color: #1565c0; }
.snum.multiplication { background: #e8f5e9; color: #2e7d32; }
.snum.addition,.snum.subtraction,.snum.general { background: #f5f5f5; color: #555; border: 1px solid #e0e0e0; }
.stitle { font-size: 12.5px; font-weight: 600; color: #222; flex: 1; }
.srule { font-size: 10px; color: #888; background: #f5f5f5; padding: 2px 8px; border-radius: 8px; white-space: nowrap; }
.sspk { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; color: #ccc; border-radius: 4px; transition: color 0.2s; }
.sspk:hover { color: #555; }
.sbody { padding: 11px 13px; display: flex; flex-direction: column; gap: 7px; }
.sexpr { font-family: 'Courier New', monospace; font-size: 13px; color: #222; line-height: 1.8; white-space: pre-wrap; background: #f8f9fa; border-radius: 8px; padding: 10px 12px; }
.sexp { font-size: 12.5px; color: #555; line-height: 1.75; }

.ans-card { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 12px; padding: 12px 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.ans-left { display: flex; align-items: flex-start; gap: 10px; }
.ans-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.ans-lbl { font-size: 10px; color: #2e7d32; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; font-weight: 600; }
.ans-val { font-family: 'Courier New', monospace; font-size: 13.5px; color: #1b5e20; line-height: 1.7; white-space: pre-wrap; font-weight: 600; }
.read-all-btn { padding: 6px 13px; border-radius: 16px; border: 1.5px solid #4caf50; background: transparent; color: #2e7d32; font-size: 11px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; font-weight: 600; }
.read-all-btn:hover { background: #fff; }

.ver-card { background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 12px; padding: 9px 13px; font-size: 12px; color: #666; line-height: 1.7; }
.tip-card { background: #fffde7; border: 1px solid #f9a825; border-radius: 12px; padding: 9px 13px; font-size: 12px; color: #795548; line-height: 1.7; }
.vals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.val-card { background: #f8f9fa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 10px 12px; }
.val-title { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 4px; }
.val-eq { font-family: 'Courier New', monospace; font-size: 12.5px; color: #222; line-height: 1.65; white-space: pre-wrap; }
.val-note { font-size: 11px; color: #aaa; margin-top: 4px; }
.conv-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; align-items: center; }
.conv-pill { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 600; }
.conv-yes { background: #e8f5e9; color: #2e7d32; }
.conv-no { background: #ffebee; color: #c62828; }
.conv-lbl { font-size: 11px; color: #aaa; }

/* TYPING */
.tdots { background: #fff; border: 1px solid #e8e8e8; border-radius: 4px 16px 16px 16px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
.td { width: 7px; height: 7px; border-radius: 50%; background: #ccc; animation: du 1.3s ease infinite; }
.td:nth-child(2){animation-delay:.22s}.td:nth-child(3){animation-delay:.44s}
@keyframes du{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

/* ATTACH PREVIEW */
#attach-preview { display: none; align-items: center; gap: 8px; padding: 7px 14px; background: #f8f9fa; border-top: 1px solid #eee; flex-shrink: 0; flex-wrap: wrap; }
.ap-chip { display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 4px 10px; font-size: 12px; color: #444; }
.ap-chip img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; }
.ap-rm { cursor: pointer; color: #bbb; font-size: 14px; margin-left: 2px; }
.ap-rm:hover { color: #e53935; }

/* INPUT BAR */
#inputbar { display: flex; gap: 8px; align-items: flex-end; padding: 11px 14px; border-top: 1px solid #eee; background: #fff; flex-shrink: 0; }
#txt { flex: 1; resize: none; border: 1.5px solid #e0e0e0; border-radius: 22px; padding: 9px 15px; font-size: 13.5px; font-family: inherit; color: #222; background: #fafafa; outline: none; min-height: 40px; max-height: 110px; line-height: 1.5; transition: border-color 0.2s, background 0.2s; }
#txt:focus { border-color: #1a73e8; background: #fff; }
#txt::placeholder { color: #bbb; }
.ibtn { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #e0e0e0; background: #fafafa; color: #666; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.ibtn:hover { background: #f0f0f0; color: #222; }
.ibtn:disabled { opacity: 0.3; cursor: not-allowed; }
#sendbtn { background: #1a73e8; border-color: #1a73e8; color: #fff; font-size: 18px; }
#sendbtn:hover { background: #1557b0; }
#micbtn.on { background: #ffebee; color: #e53935; border-color: #f5a5a5; }
#file-input { display: none; }
@media(max-width:540px){ body{padding:0;align-items:flex-start;} #app{height:100vh;max-height:100vh;border-radius:0;box-shadow:none;} }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="face">🧮</div>
    <div id="hinfo">
      <div id="hname">MathBot Ultimate</div>
      <div id="hsub">Any problem · Any level · Class 1 to PhD</div>
      <div id="hstatus"><span class="sdot" id="sdot"></span><span id="stxt">Ready</span></div>
    </div>
    <div id="hctrl">
      <button class="hbtn on" id="vbtn" onclick="toggleVoice()">🔊 Voice</button>
      <button id="spdbtn" onclick="cycleSpeed()">Normal</button>
    </div>
  </div>

  <div id="wavebar">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
  </div>

  <div id="qrow">
    <button class="qb" onclick="qs('2 + 3 * 4 - 8 / 2')">BODMAS</button>
    <button class="qb" onclick="qs('2x - 3y expression')">2x-3y</button>
    <button class="qb" onclick="qs('x2 - 5x + 6 = 0')">Quadratic</button>
    <button class="qb" onclick="qs('P=5000 R=8 T=3')">Simple Interest</button>
    <button class="qb" onclick="qs('CP=800 SP=1000')">Profit/Loss</button>
    <button class="qb" onclick="qs('area of circle radius 7')">Circle</button>
    <button class="qb" onclick="qs('sides 5 12 find hypotenuse')">Pythagoras</button>
    <button class="qb" onclick="qs('sin30 + cos60 + tan45')">Trigonometry</button>
    <button class="qb" onclick="qs('x3 + 3x2 - 5x differentiate')">Calculus</button>
    <button class="qb" onclick="qs('mean of 4 7 13 2 1')">Statistics</button>
    <button class="qb" onclick="qs('zeta function s=2')">Riemann ζ</button>
    <button class="qb" onclick="qs('euler number e formula')">Euler e</button>
    <button class="qb" onclick="qs('fibonacci sequence first 10')">Fibonacci</button>
    <button class="qb" onclick="qs('prime numbers up to 30')">Primes</button>
    <button class="qb" onclick="qs('binomial theorem (a+b)3')">Binomial</button>
    <button class="qb" onclick="qs('matrix [[2,3],[1,4]] determinant')">Matrix</button>
  </div>

  <div id="messages"></div>
  <div id="attach-preview"></div>
  <div id="inputbar">
    <input type="file" id="file-input" accept="image/*,.pdf,.txt,.doc,.docx" multiple onchange="handleFiles(this.files)">
    <button class="ibtn" onclick="document.getElementById('file-input').click()" title="Attach file or photo">📎</button>
    <textarea id="txt" placeholder="Type any math problem…" rows="1"></textarea>
    <button class="ibtn" id="micbtn" onclick="toggleMic()" title="Speak">🎤</button>
    <button class="ibtn" id="sendbtn" onclick="sendMsg()" title="Send">➤</button>
  </div>
</div>

<script>
var msgsEl=document.getElementById('messages');
var txtEl=document.getElementById('txt');
var sendBtn=document.getElementById('sendbtn');
var micBtn=document.getElementById('micbtn');
var stxtEl=document.getElementById('stxt');
var sdotEl=document.getElementById('sdot');
var faceEl=document.getElementById('face');
var wavebarEl=document.getElementById('wavebar');
var attachPreviewEl=document.getElementById('attach-preview');
var isBusy=false,voiceOn=true,speechRate=0.85,recog=null,isListening=false,waveTimer=null;
var speeds=[{l:'Slow',r:0.7},{l:'Normal',r:0.85},{l:'Fast',r:1.05}];
var speedIdx=1;
var pendingFiles=[];

// ── FILE HANDLING ──────────────────────────────────────────────────────────
function handleFiles(files){
  for(var i=0;i<files.length;i++){
    var f=files[i];
    var reader=new FileReader();
    (function(file){
      reader.onload=function(e){
        pendingFiles.push({name:file.name,type:file.type,size:file.size,data:e.target.result});
        renderAttachPreview();
      };
      if(file.type.startsWith('image/')){reader.readAsDataURL(file);}
      else{reader.readAsText(file);}
    })(f);
  }
  document.getElementById('file-input').value='';
}
function renderAttachPreview(){
  if(!pendingFiles.length){attachPreviewEl.style.display='none';return;}
  attachPreviewEl.style.display='flex';
  attachPreviewEl.innerHTML='';
  pendingFiles.forEach(function(f,idx){
    var chip=document.createElement('div');chip.className='ap-chip';
    if(f.type&&f.type.startsWith('image/')){
      chip.innerHTML='<img src="'+f.data+'" alt="'+esc(f.name)+'"><span>'+esc(f.name.substring(0,18)+(f.name.length>18?'...':''))+'</span><span class="ap-rm" onclick="removeFile('+idx+')">✕</span>';
    }else{
      var icon=f.name.endsWith('.pdf')?'📄':f.name.endsWith('.txt')?'📝':'📎';
      chip.innerHTML='<span style="font-size:17px">'+icon+'</span><span>'+esc(f.name.substring(0,18)+(f.name.length>18?'...':''))+'</span><span class="ap-rm" onclick="removeFile('+idx+')">✕</span>';
    }
    attachPreviewEl.appendChild(chip);
  });
}
function removeFile(idx){pendingFiles.splice(idx,1);renderAttachPreview();}

// ── VOICE ──────────────────────────────────────────────────────────────────
function getBestVoice(){
  var vs=window.speechSynthesis.getVoices();if(!vs.length)return null;
  var names=['Daniel','Alex','Google US English','Samantha','Victoria','Karen'];
  for(var i=0;i<names.length;i++){var v=vs.find(function(v){return v.name.indexOf(names[i])>=0;});if(v)return v;}
  return vs.find(function(v){return /en/i.test(v.lang);})||vs[0]||null;
}
function startWave(){wavebarEl.style.opacity='1';var b=wavebarEl.querySelectorAll('.wb');waveTimer=setInterval(function(){b.forEach(function(b){b.style.height=(3+Math.random()*16)+'px';});},80);}
function stopWave(){wavebarEl.style.opacity='0';clearInterval(waveTimer);wavebarEl.querySelectorAll('.wb').forEach(function(b){b.style.height='4px';});}
function speak(text,onEnd){
  if(!voiceOn||!window.speechSynthesis){if(onEnd)onEnd();return;}
  window.speechSynthesis.cancel();
  var clean=text.replace(/[*_~`#\[\]]/g,' ').replace(/\s+/g,' ').trim();
  if(!clean){if(onEnd)onEnd();return;}
  var utt=new SpeechSynthesisUtterance(clean);
  var v=getBestVoice();if(v)utt.voice=v;
  utt.rate=speechRate;utt.pitch=1.05;utt.volume=1;utt.lang='en-US';
  utt.onstart=function(){faceEl.classList.add('thinking');setStatus('Speaking...',true);startWave();};
  utt.onend=function(){faceEl.classList.remove('thinking');setStatus('Ready',false);stopWave();if(onEnd)onEnd();};
  utt.onerror=function(){faceEl.classList.remove('thinking');setStatus('Ready',false);stopWave();if(onEnd)onEnd();};
  window.speechSynthesis.speak(utt);
}
function speakAll(steps,intro,answer,tip){
  if(!voiceOn)return;
  window.speechSynthesis.cancel();
  var q=[];
  if(intro)q.push({text:intro,si:-1});
  steps.forEach(function(s,i){q.push({text:'Step '+s.num+'. '+s.title+'. '+s.explanation+'. '+s.expression.replace(/\n/g,'. ').replace(/=/g,' equals '),si:i});});
  if(answer)q.push({text:'Final answer. '+answer.replace(/=/g,' equals '),si:-2});
  if(tip)q.push({text:'Remember. '+tip,si:-3});
  var idx=0;var cards=document.querySelectorAll('.step-card');
  function next(){if(idx>=q.length)return;var item=q[idx];cards.forEach(function(c){c.classList.remove('active-step');});if(item.si>=0&&cards[item.si])cards[item.si].classList.add('active-step');speak(item.text,function(){idx++;setTimeout(next,350);});}
  setTimeout(next,200);
}
function toggleVoice(){voiceOn=!voiceOn;var b=document.getElementById('vbtn');b.textContent=voiceOn?'🔊 Voice':'🔇 Muted';b.className='hbtn'+(voiceOn?' on':'');if(!voiceOn){window.speechSynthesis.cancel();faceEl.classList.remove('thinking');stopWave();setStatus('Ready',false);}}
function cycleSpeed(){speedIdx=(speedIdx+1)%speeds.length;speechRate=speeds[speedIdx].r;document.getElementById('spdbtn').textContent=speeds[speedIdx].l;}
function toggleMic(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;if(isListening){if(recog)recog.stop();return;}window.speechSynthesis.cancel();recog=new SR();recog.lang='en-US';recog.continuous=false;recog.interimResults=false;recog.onstart=function(){isListening=true;micBtn.className='ibtn on';setStatus('Listening...',true);};recog.onresult=function(e){var s=e.results[0][0].transcript.trim();if(s){txtEl.value=s;sendMsg();}};recog.onend=function(){isListening=false;micBtn.className='ibtn';if(stxtEl.textContent==='Listening...')setStatus('Ready',false);};recog.onerror=function(){isListening=false;micBtn.className='ibtn';setStatus('Ready',false);};try{recog.start();}catch(e){isListening=false;micBtn.className='ibtn';}}

// ── HELPERS ────────────────────────────────────────────────────────────────
function nums(s){return(s.match(/-?\d+\.?\d*/g)||[]).map(Number);}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function primeF(n){var f=[],d=2,orig=n;while(d<=n){while(n%d===0){f.push(d);n/=d;}d++;}return f.length?f.join('x'):String(orig);}
function isPrime(n){if(n<2)return false;for(var i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}

function calcExpr(e){
  try{
    var s=String(e);
    var t=[],n='';
    for(var i=0;i<s.length;i++){
      var c=s[i];
      if(c===' '){if(n){t.push(n);n='';}continue;}
      if('+-*/'.indexOf(c)>=0){if(n){t.push(n);n='';}if(c==='-'&&(t.length===0||'+-*/'.indexOf(t[t.length-1])>=0)){n='-';continue;}t.push(c);}
      else n+=c;
    }
    if(n)t.push(n);
    var r=parseFloat(t[0]);
    for(var i=1;i<t.length;i+=2){var op=t[i],b=parseFloat(t[i+1]);if(op==='+')r+=b;else if(op==='-')r-=b;else if(op==='*')r*=b;else if(op==='/')r/=b;}
    return parseFloat(r.toFixed(8));
  }catch(ex){return 0;}
}

function mk(p,i,steps,a,v,t){return{problem:p,intro:i,steps:steps,answer:a,verify:v||'',tip:t||'',extra:null};}
function st(n,type,title,rule,expr,expl){return{num:n,type:type,title:title,rule:rule,expression:expr,explanation:expl};}

// ── SMART DETECTOR ────────────────────────────────────────────────────────
function detect(q){
  var s=q.trim(),l=s.toLowerCase();
  // Advanced math topics
  if(/\bzeta\b|riemann\s*zeta|zeta\s*function/i.test(l))return 'zeta';
  if(/\beuler\b.*\bnumber\b|\bnumber\b.*\beuler\b|euler.*constant|euler.*e\b|\be\s*=\s*2\.71/i.test(l))return 'euler_e';
  if(/fibonacci|fib\s*sequence/i.test(l))return 'fibonacci';
  if(/prime.*number|list.*prime|primes.*up\s*to|sieve/i.test(l))return 'primes';
  if(/binomial\s*theorem|\(a\+b\)[23456]|\(x\+y\)[23456]/i.test(l))return 'binomial';
  if(/taylor\s*series|maclaurin/i.test(l))return 'taylor';
  if(/fourier/i.test(l))return 'fourier';
  if(/golden\s*ratio|phi\b|1\.618/i.test(l))return 'golden';
  if(/log\s*\d|log\s*base|logarithm|ln\s*\d|natural\s*log/i.test(l))return 'logarithm';

function solveZeta(q){

  var results={'2':'pi^2/6 = 1.6449340668...','3':'1.2020569031... (Apery constant, irrational)','4':'pi^4/90 = 1.0823232337...','6':'pi^6/945 = 1.0173430619...','8':'pi^8/9450 = 1.0040773561...','-1':'-1/12 (analytic continuation)','0':'-1/2 (analytic continuation)'};

  return {
    problem:'Riemann Zeta Function: zeta('+s+')',
    intro:'The Riemann Zeta Function is defined as the infinite series: zeta(s) = 1/1^s + 1/2^s + 1/3^s + ... It converges for Re(s) > 1 and connects deeply to prime numbers.',
    steps:[
      st(1,'general','The Definition','zeta(s) = Sum 1/n^s from n=1 to infinity',
        'zeta(s) = 1/1^s + 1/2^s + 1/3^s + 1/4^s + ...\n\n       = 1 + 1/2^s + 1/3^s + 1/4^s + ...','The zeta function sums the reciprocals of all positive integers each raised to the power s. This is an infinite series.'),
      st(2,'general','Convergence Condition','Series converges only when Re(s) > 1',
        'If Re(s) > 1  ->  Series converges (gives finite value)\nIf Re(s) = 1  ->  Harmonic series, DIVERGES to infinity\nIf Re(s) < 1  ->  Diverges (use analytic continuation)','For s = 1: zeta(1) = 1 + 1/2 + 1/3 + ... diverges. For s = 2: converges to pi^2/6.'),
      st(3,'general','Evaluate zeta('+s+')','Substitute and compute',
        'zeta('+s+') = 1/1^'+s+' + 1/2^'+s+' + 1/3^'+s+' + 1/4^'+s+' + ...\n\n'+(s>1?'Numerical approximation (10000 terms):\n= '+approx:'Use analytic continuation for s <= 1'),
        s===2?'This equals pi^2/6. Proved by Euler in 1734 — the famous Basel Problem!':s===4?'This equals pi^4/90, another Euler result.':s>1?'Computed by summing the first 10000 terms of the series.':'For s <= 1, the series diverges. Analytic continuation extends the function.'),
      st(4,'general','Euler Product Formula','Connection to prime numbers',
        'zeta(s) = Product over all primes p:\n\nzeta(s) = 1/(1-2^-s) * 1/(1-3^-s) * 1/(1-5^-s) * 1/(1-7^-s) * ...\n\n       = Product [1/(1-p^-s)]  for every prime p','This remarkable formula by Euler shows zeta is an infinite product over ALL prime numbers!'),
      st(5,'general','Special Values','Known exact results',
        'zeta(2) = pi^2/6       = 1.6449340668...\nzeta(3) = 1.2020569031... (Apery, irrational, no pi formula)\nzeta(4) = pi^4/90      = 1.0823232337...\nzeta(-1) = -1/12       (analytic continuation)\nzeta(0)  = -1/2        (analytic continuation)','For even integers, Euler found closed forms involving pi. For odd integers like zeta(3), no such formula exists.'),
      st(6,'general','The Riemann Hypothesis — $1 Million Prize','Greatest unsolved problem in math',
        'Hypothesis (Riemann, 1859):\n"All non-trivial zeros of zeta(s) lie on\n the critical line  Re(s) = 1/2"\n\nVerified for: over 10 TRILLION zeros\nProved: NEVER\nStatus: UNSOLVED for 165+ years','This is one of the 7 Millennium Prize Problems. Solving it wins $1,000,000 from the Clay Mathematics Institute!')
    ],

  };
}

function solveBinomial(q){
  var n=nums(q);var power=n.length>0?Math.min(n[n.length-1],6):3;
  function factN(n){if(n<=1)return 1;return n*factN(n-1);}
  function C(n,r){return factN(n)/(factN(r)*factN(n-r));}
  var terms=[];
  for(var k=0;k<=power;k++){
    var coeff=C(power,k);
    var aExp=power-k,bExp=k;
    var term=(coeff>1?coeff:'')+(aExp>0?('a'+(aExp>1?'^'+aExp:'')):'')+(bExp>0?('b'+(bExp>1?'^'+bExp:'')):'');
    terms.push(term);
  }
  var coeffs=[];for(var k=0;k<=power;k++)coeffs.push(C(power,k));
  return mk('Binomial Theorem: (a+b)^'+power,'The Binomial Theorem expands (a+b)^n into a sum of terms. Each term uses binomial coefficients from Pascal\'s Triangle.',
    [st(1,'general','The Theorem','General formula','(a+b)^n = Sum [C(n,k) * a^(n-k) * b^k] for k=0 to n\n\nC(n,k) = n! / (k! * (n-k)!)  (binomial coefficient)','Each term combines a power of a, a power of b, and a binomial coefficient.'),
     st(2,'general','Pascal\'s Triangle','Coefficients pattern','         1\n        1 1\n       1 2 1\n      1 3 3 1\n     1 4 6 4 1\n    1 5 10 10 5 1\n   1 6 15 20 15 6 1','Row n gives the coefficients for (a+b)^n. Each number is the sum of the two above it!'),
     st(3,'general','Coefficients for n='+power,'C('+power+',0) to C('+power+','+power+')','k:    '+Array.from({length:power+1},function(_,i){return i;}).join('    ')+'\nC:    '+coeffs.join('    '),'These are the coefficients of each term in the expansion.'),
     st(4,'general','Full Expansion','(a+b)^'+power,'(a+b)^'+power+' = '+terms.join(' + '),'Each term is: C('+power+',k) * a^('+power+'-k) * b^k for k = 0,1,2,...,'+power)],
  '(a+b)^'+power+' = '+terms.join(' + '),'','Pascal\'s Triangle gives coefficients instantly: row n gives coefficients of (a+b)^n!');
}

    [st(1,'general','Definition','What logarithm means','log_b(x) = y  means  b^y = x\n\nlog_10(100) = 2  because  10^2 = 100\nlog_10(1000) = 3 because  10^3 = 1000\nln(e) = 1        because  e^1 = e\nlog_2(8) = 3     because  2^3 = 8','The logarithm is the inverse (opposite) of exponentiation.'),
     st(2,'general','Laws of Logarithms','Key rules to remember','1. log(a*b) = log(a) + log(b)\n2. log(a/b) = log(a) - log(b)\n3. log(a^n) = n * log(a)\n4. log_b(b) = 1\n5. log_b(1) = 0\n6. Change base: log_b(x) = ln(x) / ln(b)','These rules transform multiplication into addition — that\'s why logarithms were invented (before calculators)!'),

     st(4,'general','Natural Log vs Log base 10','Two common types','log_10(x) = common log = "log"\nln(x)     = natural log = log base e\n\nln('+x+')      = '+ln_x+'\nlog_10('+x+') = '+parseFloat((Math.log10(x)).toFixed(6))+'\n\nRelation: ln(x) = 2.302585 * log_10(x)','Natural log uses base e = 2.71828. Common log uses base 10. Both are widely used.')],

function solveComplex(q){
  return mk('Complex Numbers: i = sqrt(-1)','Complex numbers extend the real number line to a 2D plane. Every complex number has a real part and an imaginary part: z = a + bi.',
    [st(1,'general','Definition','What is i?','i = sqrt(-1)\ni^2 = -1\ni^3 = -i\ni^4 = 1  (then repeats: i, -1, -i, 1, i, -1...)\n\nComplex number: z = a + bi\nReal part: Re(z) = a\nImaginary part: Im(z) = b','The number i was invented to solve equations like x^2 = -1 which have no real solution.'),
     st(2,'general','Arithmetic','Operations with complex numbers','Addition:       (a+bi) + (c+di) = (a+c) + (b+d)i\nSubtraction:    (a+bi) - (c+di) = (a-c) + (b-d)i\nMultiplication: (a+bi)(c+di) = (ac-bd) + (ad+bc)i\nDivision:       (a+bi)/(c+di) = multiply by conjugate\n\nExample: (2+3i)(1-2i) = (2+6) + (-4+3)i = 8 - i','Key: i^2 = -1. Use this to simplify products.'),

     st(4,'general','Euler\'s Formula','Most beautiful result','e^(i*theta) = cos(theta) + i*sin(theta)\n\nWhen theta = pi:\ne^(i*pi) = cos(pi) + i*sin(pi) = -1 + 0 = -1\n\nTherefore: e^(i*pi) + 1 = 0\n\nThis is Euler\'s Identity — often called the\n"most beautiful equation in mathematics"','This connects e, i, pi, 1 and 0 in one equation!')],

function solvePermComb(q){

function solveLinear(q){
  // Detect variable name (x, t, y, n, etc.)
  var varMatch = q.match(/[a-zA-Z]/);
  var varName = varMatch ? varMatch[0] : 'x';
  var re = new RegExp(varName,'gi');

  // Split on =
  var parts = q.split('=');
  if(parts.length < 2) return solveExpression(q);
  var lhs = parts[0].trim();
  var rhs = parts[1].trim();

  // Parse coefficients of variable and constants from each side
  // Returns {coeff, constant} for an expression like "16 - 2t" or "5t + 9"
  function parseSide(expr, vname){
    var coeff = 0, constant = 0;
    // Normalise: ensure leading +/- is captured
    var e = expr.replace(/\s+/g,'');
    // Add + at start if doesn't start with -
    if(e[0] !== '-') e = '+' + e;
    // Find all terms: sign + number + optional variable
    var termRe = /([+\-])(\d*\.?\d*)([a-zA-Z]?)/g;
    var match;
    while((match = termRe.exec(e)) !== null){
      var sign = match[1] === '-' ? -1 : 1;
      var numStr = match[2];
      var hasVar = match[3].toLowerCase() === vname.toLowerCase();
      var num = numStr === '' ? 1 : parseFloat(numStr);
      if(isNaN(num)) num = 1;
      if(hasVar){
        coeff += sign * num;
      } else {
        if(numStr !== '') constant += sign * num;
      }
    }
    return {coeff: coeff, constant: constant};
  }

  var L = parseSide(lhs, varName);
  var R = parseSide(rhs, varName);

  // ax + b = cx + d  =>  (a-c)x = d-b
  var netCoeff = L.coeff - R.coeff;
  var netConst = R.constant - L.constant;

  if(netCoeff === 0){
    return mk(q,'Linear equation with variable '+varName+'.',
      [st(1,'general','No solution or infinite solutions','',
        lhs+' = '+rhs+'\n'+L.coeff+varName+' - '+R.coeff+varName+' = '+R.constant+' - '+L.constant+'\n0 = '+( netConst),
        netConst===0?'0=0: Infinitely many solutions!':'0='+netConst+': No solution (contradiction).')],
      netConst===0?'Infinitely many solutions':'No solution','','');
  }

  var answer = parseFloat((netConst/netCoeff).toFixed(6));

  // Build explanation steps
  var steps = [];

  steps.push(st(1,'general','Write the equation clearly','Original equation',
    lhs + ' = ' + rhs,
    'We need to collect all terms with '+varName+' on one side and all numbers on the other side.'));

  // Step 2: move variable terms
  var lhsVarStr = L.coeff !== 0 ? (L.coeff === 1 ? varName : (L.coeff === -1 ? '-'+varName : L.coeff+varName)) : '0';
  var rhsVarStr = R.coeff !== 0 ? (R.coeff === 1 ? varName : (R.coeff === -1 ? '-'+varName : R.coeff+varName)) : '0';
  var lhsConstStr = L.constant !== 0 ? (L.constant > 0 ? ' + '+L.constant : ' - '+Math.abs(L.constant)) : '';
  var rhsConstStr = R.constant !== 0 ? (R.constant > 0 ? ' + '+R.constant : ' - '+Math.abs(R.constant)) : '';

  steps.push(st(2,'subtraction',
    'Move all '+varName+' terms to LEFT side','Subtract '+rhsVarStr+' from both sides',
    lhs + ' = ' + rhs +
    '\n\nSubtract ('+rhsVarStr+') from both sides:' +
    '\n'+lhsVarStr+lhsConstStr+' - ('+rhsVarStr+') = '+rhsConstStr+
    '\n'+(L.coeff-R.coeff)+varName+lhsConstStr+' = '+rhsConstStr,
    'Moving '+rhsVarStr+' to the left eliminates the variable from the right side. Left coefficient: '+L.coeff+' - ('+R.coeff+') = '+netCoeff));

  steps.push(st(3,'addition',
    'Move all numbers to RIGHT side','Move constants',
    netCoeff+varName+lhsConstStr+' = '+( R.constant !== 0 ? R.constant : '0') +
    '\n\nSubtract ('+L.constant+') from both sides:'+
    '\n'+netCoeff+varName+' = '+(R.constant - L.constant),
    'Moving '+L.constant+' to the right: right side becomes '+R.constant+' - ('+L.constant+') = '+netConst+'.'));

  steps.push(st(4,'division',
    'Divide both sides by '+netCoeff,'Isolate '+varName,
    netCoeff+varName+' = '+netConst+
    '\n\n'+varName+' = '+netConst+' / '+netCoeff+
    '\n'+varName+' = '+answer,
    'Dividing both sides by '+netCoeff+' gives '+varName+' = '+answer+'.'));

  // Verify
  var lhsVal = L.coeff * answer + L.constant;
  var rhsVal = R.coeff * answer + R.constant;

  return mk(q,
    'Linear equation with variable "'+varName+'" on both sides. We collect like terms: move all '+varName+' terms to the left and all numbers to the right.',
    steps,
    varName+' = '+answer,
    'Verify: LHS = '+lhsVal.toFixed(4)+', RHS = '+rhsVal.toFixed(4)+' '+( Math.abs(lhsVal-rhsVal)<0.001?'✓ Correct!':'✗ Check working'),

// ── DISPATCHER ──────────────────────────────────────────────────────────────
function solve(q){
  var t=detect(q);
  if(t==='zeta')return solveZeta(q);
  if(t==='euler_e')return solveEulerE(q);
  if(t==='fibonacci')return solveFibonacci(q);
  if(t==='primes')return solvePrimes(q);
  if(t==='binomial')return solveBinomial(q);
  if(t==='logarithm')return solveLogarithm(q);
  if(t==='complex')return solveComplex(q);
  if(t==='golden')return solveGolden(q);
  if(t==='probability')return solveProbability(q);
  if(t==='permcomb')return solvePermComb(q);
  if(t==='limit')return solveLimit(q);
  if(t==='bodmas')return solveBODMAS(q);
  if(t==='si')return solveSI(q);
  if(t==='ci')return solveCI(q);
  if(t==='profit')return solvePL(q);
  if(t==='discount')return solveDiscount(q);
  if(t==='vat')return solveVAT(q);
  if(t==='circle')return solveCircle(q);
  if(t==='triangle')return solveTriangle(q);
  if(t==='pythagoras')return solvePyth(q);
  if(t==='cylinder')return solveCylinder(q);
  if(t==='sphere')return solveSphere(q);
  if(t==='rectangle')return solveRect(q);
  if(t==='quadratic')return solveQuad(q);
  if(t==='linear')return solveLinear(q);
  if(t==='diff')return solveDiff(q);
  if(t==='integrate')return solveInteg(q);
  if(t==='trig')return solveTrig(q);
  if(t==='mean')return solveMean(q);
  if(t==='median')return solveMedian(q);
  if(t==='mode')return solveMode(q);
  if(t==='variance')return solveVar(q);
  if(t==='sd')return solveSD(q);
  if(t==='range')return solveRange(q);
  if(t==='hcf')return solveHCF(q);
  if(t==='lcm')return solveLCM(q);
  if(t==='percent')return solvePercent(q);
  if(t==='determinant')return solveDet(q);
  return solveExpression(q);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderSol(d){
  var h='<div class="sol-wrap">';
  h+='<div class="prob-box"><div class="prob-lbl">Problem</div><div class="prob-eq">'+esc(d.problem)+'</div></div>';
  if(d.intro)h+='<div class="intro-txt">'+esc(d.intro)+'</div>';
  d.steps.forEach(function(s,i){
    var t=s.type||'general';
    var spkT=esc('Step '+s.num+'. '+s.title+'. '+s.explanation+'. '+s.expression.replace(/\n/g,'. '));
    h+='<div class="step-card" id="sc'+i+'"><div class="step-head"><div class="snum '+t+'">'+s.num+'</div>';
    h+='<div class="stitle">'+esc(s.title)+'</div>';
    if(s.rule)h+='<div class="srule">'+esc(s.rule)+'</div>';
    h+='<button class="sspk" onclick="spkStep(this,\''+spkT+'\')">🔊</button></div>';
    h+='<div class="sbody"><div class="sexpr">'+esc(s.expression)+'</div><div class="sexp">'+esc(s.explanation)+'</div></div></div>';
  });
  var sd=JSON.stringify({steps:d.steps,intro:d.intro,answer:d.answer,tip:d.tip}).replace(/"/g,'&quot;');
  h+='<div class="ans-card"><div class="ans-left"><div class="ans-icon">✅</div><div><div class="ans-lbl">Final Answer</div><div class="ans-val">'+esc(d.answer)+'</div></div></div>';
  h+='<button class="read-all-btn" onclick="readAll(this)" data-sol="'+sd+'">▶ Read All</button></div>';
  if(d.verify)h+='<div class="ver-card">🔍 '+esc(d.verify)+'</div>';
  if(d.tip)h+='<div class="tip-card">💡 '+esc(d.tip)+'</div>';
  h+='</div>';return h;
}

function readAll(btn){
  if(!voiceOn)return;
  window.speechSynthesis.cancel();
  var data=JSON.parse(btn.getAttribute('data-sol').replace(/&quot;/g,'"'));
  btn.textContent='⏹ Stop';
  var cards=btn.closest('.sol-wrap').querySelectorAll('.step-card');
  speakAll(data.steps,data.intro,data.answer,data.tip);
  var chk=setInterval(function(){if(!window.speechSynthesis.speaking){btn.textContent='▶ Read All';cards.forEach(function(c){c.classList.remove('active-step');});clearInterval(chk);}},600);
}
function spkStep(btn,text){
  if(!voiceOn)return;
  document.querySelectorAll('.sspk').forEach(function(b){b.textContent='🔊';});
  btn.textContent='⏸';
  speak(text,function(){btn.textContent='🔊';});
}

function setStatus(t,busy){stxtEl.textContent=t;sdotEl.className='sdot'+(busy?' busy':'');}

function addUser(text,files){
  var d=document.createElement('div');d.className='msg user';
  var c='';
  if(files&&files.length){files.forEach(function(f){if(f.type&&f.type.startsWith('image/')){c+='<img class="atch-img" src="'+f.data+'" alt="'+esc(f.name)+'">';}else{var icon=f.name.endsWith('.pdf')?'📄':'📎';c+='<div class="atch-chip"><span>'+icon+'</span><span>'+esc(f.name.substring(0,20))+'</span></div>';}});}
  if(text)c+='<div class="ubub">'+esc(text)+'</div>';
  d.innerHTML='<div class="av">🧑</div><div>'+c+'<div class="ts">'+getTime()+'</div></div>';
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function addAgent(html){return new Promise(function(r){var d=document.createElement('div');d.className='msg agent';d.innerHTML='<div class="av">🧮</div><div>'+html+'<div class="ts">'+getTime()+'</div></div>';msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;r();});}
function showTyping(){removeTyping();var d=document.createElement('div');d.className='msg agent';d.id='ty';d.innerHTML='<div class="av">🧮</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;}
function removeTyping(){var t=document.getElementById('ty');if(t)t.remove();}

async function sendMsg(){
  var text=txtEl.value.trim();var files=pendingFiles.slice();
  if(!text&&!files.length)return;if(isBusy)return;
  isBusy=true;sendBtn.disabled=true;txtEl.value='';txtEl.style.height='auto';
  pendingFiles=[];renderAttachPreview();
  addUser(text,files);
  faceEl.classList.add('thinking');setStatus('Solving...',true);showTyping();
  await new Promise(function(r){setTimeout(r,300+Math.random()*200);});
  removeTyping();faceEl.classList.remove('thinking');
  var q=text;
  if(!q&&files.length){
    var ft='';
    files.forEach(function(f){if(f.type&&!f.type.startsWith('image/')&&typeof f.data==='string'&&!f.data.startsWith('data:')){ft+=f.data.substring(0,2000);}});
    if(ft){var nums_found=ft.match(/[\d\s+\-*/x().=]+/g);if(nums_found)q=nums_found.join(' ').trim();}
    if(!q){
      await addAgent(renderSol({problem:'File attached: '+files[0].name,intro:'I received your file! For image files, please also type the math question in the text box.',steps:[st(1,'general','How to use file upload','',('1. Attach your photo\n2. Type the math question\n3. I solve it step by step'),'Works best when you type the question!')],answer:'Type the question from your image in the text box',verify:'',tip:'Take a photo of your textbook question, attach it, and type it — I will solve it!'}));
      setStatus('Ready',false);isBusy=false;sendBtn.disabled=false;return;
    }
  }
  var result=solve(q||text);
  await addAgent(renderSol(result));
  setStatus('Ready',false);
  if(voiceOn)setTimeout(function(){speakAll(result.steps,result.intro,result.answer,result.tip);},300);
  isBusy=false;sendBtn.disabled=false;txtEl.focus();
}

function qs(t){if(isBusy)return;txtEl.value=t;sendMsg();}
txtEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
txtEl.addEventListener('input',function(){txtEl.style.height='auto';txtEl.style.height=Math.min(txtEl.scrollHeight,110)+'px';});
window.speechSynthesis.onvoiceschanged=function(){};

// Drag and drop
document.getElementById('app').addEventListener('dragover',function(e){e.preventDefault();});
document.getElementById('app').addEventListener('drop',function(e){e.preventDefault();var files=e.dataTransfer.files;if(files.length)handleFiles(files);});

// Welcome
setTimeout(function(){
  addAgent(renderSol(solveZeta('zeta function s=2')));
  if(voiceOn)setTimeout(function(){speak('Welcome to MathBot Ultimate! I can solve any math problem from basic arithmetic to the Riemann Zeta function and beyond. Just type your problem or attach a photo!');},500);
},400);
</script>
